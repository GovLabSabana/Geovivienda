<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVivienda | Inteligencia Inmobiliaria</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="app-container">

        <!-- Panel Principal -->
        <main class="main-content">
            <div class="map-wrapper">
                <div id="map"></div>
            </div>
            <div class="table-panel">
                <div class="table-toolbar">
                    <h2>Inventario Geolocalizado</h2>
                    <span id="prop-count" class="badge">0 registros</span>
                    <button class="btn-danger" onclick="clearAllData()">Eliminar todo</button>
                </div>
                <!-- Filter row -->
                <div class="filter-row" id="filter-row"></div>
                <div class="table-body-wrap">
                    <table id="data-table">
                        <thead id="table-head">
                            <tr></tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Panel Lateral de Filtros -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="brand-icon">&#9670;</span>
                <h1>GeoVivienda</h1>
            </div>

            <div class="sidebar-body">
                <form id="scrape-form">

                    <div class="form-section">
                        <div class="section-label">Busqueda</div>
                        <div class="form-group">
                            <label class="field-label">Ciudad / Zona (slug de FincaRaiz)</label>
                            <input type="text" id="ubicacion" value="bogota/bogota-dc">
                        </div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="field-label">Operacion</label>
                                <select id="operacion">
                                    <option value="venta">Venta</option>
                                    <option value="arriendo">Arriendo</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="field-label">Estado</label>
                                <select id="estado">
                                    <option value="usados">Usados</option>
                                    <option value="nuevos">Nuevos</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="field-label">Tipo de inmueble</label>
                            <select id="tipo">
                                <option value="apartamento">Apartamento</option>
                                <option value="casa">Casa</option>
                                <option value="oficina">Oficina</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-label">Presupuesto (COP)</div>
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="field-label">Minimo</label>
                                <div class="price-input-wrap">
                                    <span>$</span>
                                    <input type="number" id="precio_min" value="250000000" step="5000000">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="field-label">Maximo</label>
                                <div class="price-input-wrap">
                                    <span>$</span>
                                    <input type="number" id="precio_max" value="350000000" step="5000000">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-label">Estrato (seleccion multiple)</div>
                        <div class="btn-group" id="estrato-group">
                            <button type="button" class="toggle-btn" data-val="1">1</button>
                            <button type="button" class="toggle-btn" data-val="2">2</button>
                            <button type="button" class="toggle-btn active" data-val="3">3</button>
                            <button type="button" class="toggle-btn" data-val="4">4</button>
                            <button type="button" class="toggle-btn" data-val="5">5</button>
                            <button type="button" class="toggle-btn" data-val="6">6</button>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-label">Caracteristicas</div>
                        <div class="form-group">
                            <label class="field-label">Cuartos minimos</label>
                            <div class="btn-group" id="cuartos-group">
                                <button type="button" class="toggle-btn" data-val="1">1+</button>
                                <button type="button" class="toggle-btn active" data-val="2">2+</button>
                                <button type="button" class="toggle-btn" data-val="3">3+</button>
                                <button type="button" class="toggle-btn" data-val="4">4+</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="field-label">Banos minimos</label>
                            <div class="btn-group" id="banos-group">
                                <button type="button" class="toggle-btn" data-val="1">1+</button>
                                <button type="button" class="toggle-btn active" data-val="2">2+</button>
                                <button type="button" class="toggle-btn" data-val="3">3+</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="field-label">Parqueaderos</label>
                            <div class="btn-group" id="parq-group">
                                <button type="button" class="toggle-btn" data-val="0">Sin filtro</button>
                                <button type="button" class="toggle-btn" data-val="1">1+</button>
                                <button type="button" class="toggle-btn" data-val="2">2+</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-label">Comodidades</div>
                        <div class="btn-group" id="comodidades-group">
                            <button type="button" class="toggle-btn" data-val="con-ascensor">Ascensor</button>
                            <button type="button" class="toggle-btn" data-val="con-balcon">Balcon</button>
                            <button type="button" class="toggle-btn" data-val="con-citofono">Citofono</button>
                            <button type="button" class="toggle-btn" data-val="cocina-integral">Cocina Integral</button>
                            <button type="button" class="toggle-btn" data-val="barra-americana">Barra Americana</button>
                            <button type="button" class="toggle-btn" data-val="calentador">Calentador</button>
                            <button type="button" class="toggle-btn" data-val="con-gimnasio">Gimnasio</button>
                            <button type="button" class="toggle-btn" data-val="zona-bbq">Zona BBQ</button>
                            <button type="button" class="toggle-btn" data-val="piscina">Piscina</button>
                            <button type="button" class="toggle-btn" data-val="conjunto-cerrado">Conjunto
                                Cerrado</button>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-label">Cobertura</div>
                        <div class="form-group">
                            <label class="field-label">Numero de inmuebles objetivo</label>
                            <input type="number" id="num_inmuebles" value="42" min="1" max="500">
                            <span class="field-hint">Cada pagina contiene ~21 anuncios.</span>
                        </div>
                    </div>

                    <button type="submit" id="btn-scrape" class="btn-search">Iniciar rastreo</button>
                </form>

                <div id="log-console" class="log-console">
                    <div class="log-line info">GeoVivienda listo. Configure los filtros y presione Iniciar rastreo.
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
